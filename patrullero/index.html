<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SENTINEL | UNIDAD DE RESPUESTA TÁCTICA</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #00ffaa; /* Verde Neón */
            --secondary: #0066ff; /* Azul Eléctrico */
            --alert: #ff3131; /* Rojo Crítico */
            --bg: #050505;
            --panel-bg: rgba(10, 15, 20, 0.95);
            --radar-color: rgba(0, 255, 170, 0.15);
        }

        body {
            background: var(--bg);
            color: var(--primary);
            font-family: 'Share Tech Mono', 'Courier New', monospace;
            height: 100vh;
            overflow: hidden;
        }

        /* EFECTO DE ALERTA GLOBAL (CAMBIO DE COLOR SISTEMA) */
        .alerta-global-active {
            animation: pulse-border 1.5s infinite;
            --radar-color: rgba(255, 49, 49, 0.3);
        }
        @keyframes pulse-border {
            0% { box-shadow: inset 0 0 20px var(--alert); }
            50% { box-shadow: inset 0 0 60px rgba(255, 49, 49, 0.4); }
            100% { box-shadow: inset 0 0 20px var(--alert); }
        }

        header {
            position: fixed; top: 0; left: 0; right: 0; height: 60px;
            background: var(--panel-bg); border-bottom: 2px solid var(--primary);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 15px; z-index: 2000;
        }

        #map { position: fixed; top: 60px; left: 0; right: 0; bottom: 0; z-index: 1; }

        /* EL OJO TÁCTICO (RADAR DE ESCANEO) */
        .radar-container {
            position: absolute; top: 50%; left: 50%;
            width: 600px; height: 600px;
            margin-top: -300px; margin-left: -300px;
            border-radius: 50%; pointer-events: none;
            z-index: 500; border: 1px solid var(--radar-color);
        }
        .radar-sweep {
            position: absolute; width: 100%; height: 100%;
            background: conic-gradient(from 0deg, var(--radar-color) 0deg, transparent 90deg);
            border-radius: 50%; animation: rotate-radar 4s linear infinite;
        }
        .radar-circle {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            border: 1px solid var(--radar-color); border-radius: 50%;
        }
        @keyframes rotate-radar { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* VISOR DE VIDEO TÁCTICO */
        .tactical-overlay {
            position: fixed; top: 75px; right: 15px; width: 220px;
            background: var(--panel-bg); border: 1px solid var(--secondary);
            z-index: 1500; padding: 5px; clip-path: polygon(10% 0, 100% 0, 100% 90%, 90% 100%, 0 100%, 0 10%);
        }
        .video-feed { width: 100%; height: 140px; background: #000; border: 1px solid var(--alert); position: relative; }
        .live-tag { position: absolute; top: 5px; left: 5px; color: var(--alert); font-size: 0.6rem; font-weight: bold; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        /* PANEL DE ACCIÓN INFERIOR */
        .action-panel {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--panel-bg); border-top: 2px solid var(--secondary);
            z-index: 2000; padding: 20px; transition: transform 0.4s ease-in-out;
        }
        .action-panel.hidden { transform: translateY(100%); }
        .data-row { display: flex; justify-content: space-between; font-size: 0.9rem; margin-bottom: 6px; }
        .label { opacity: 0.6; }
        
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn { padding: 16px; border: 2px solid; background: transparent; color: inherit; font-family: inherit; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .btn-nav { border-color: var(--secondary); color: var(--secondary); }
        .btn-arrive { border-color: #39ff14; color: #39ff14; }
        .btn-backup { grid-column: span 2; border-color: var(--alert); color: var(--alert); }

        .hidden { display: none !important; }
    </style>
</head>
<body id="main-body">

    <header>
        <div style="display: flex; align-items: center; gap: 12px;">
            <div style="width: 12px; height: 12px; background: var(--primary); border-radius: 50%; box-shadow: 0 0 10px var(--primary);"></div>
            <span style="letter-spacing: 2px;">SENTINEL: UNIT <strong id="unit-tag">K-9</strong></span>
        </div>
        <div id="clock" style="opacity: 0.8;">--:--:--</div>
    </header>

    <div id="map"></div>

    <div class="radar-container" id="radar-eye">
        <div class="radar-sweep"></div>
        <div class="radar-circle" style="width: 200px; height: 200px;"></div>
        <div class="radar-circle" style="width: 400px; height: 400px;"></div>
    </div>

    <div class="tactical-overlay hidden" id="video-overlay">
        <div class="video-feed">
            <span class="live-tag">● EN VIVO</span>
            <video id="video-player" autoplay playsinline muted style="width:100%; height:100%; object-fit:cover;"></video>
        </div>
        <div style="font-size: 0.6rem; text-align: center; margin-top: 5px; color: var(--secondary);">VÍNCULO: <span id="user-link">--</span></div>
    </div>

    <div class="action-panel hidden" id="action-panel">
        <div style="color: var(--alert); font-weight: bold; margin-bottom: 12px; border-bottom: 1px solid rgba(255,49,49,0.2); padding-bottom: 5px;">🚨 EMERGENCIA ASIGNADA</div>
        <div class="data-row"><span class="label">OBJETIVO:</span> <span id="target-name">--</span></div>
        <div class="data-row"><span class="label">DISTANCIA:</span> <span id="target-dist" style="color: var(--primary);">--</span></div>
        <div class="data-row"><span class="label">ESTADO BATERÍA:</span> <span id="target-bat">--</span></div>
        
        <div class="btn-grid">
            <button class="btn btn-nav" onclick="launchNav()">🧭 RUTA GPS</button>
            <button class="btn btn-arrive" onclick="completeObjective()">✅ EN EL LUGAR</button>
            <button class="btn btn-backup" onclick="requestBackup()">⚠️ REFUERZOS</button>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN SUPABASE [cite: 2026-01-27]
        const SB_URL = 'https://svpurpvbiujhcbiugrkh.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN2cHVycHZiaXVqaGNiaXVncmtoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc3NDgzMTUsImV4cCI6MjA4MzMyNDMxNX0.AivKJ0_N0z_4T4vLNfUcE2hepJ1XXOO8-4fSA3PJXdc';
        const _client = supabase.createClient(SB_URL, SB_KEY);

        let map, userMarker, alertMarker, routeLine, activeAlert = null, myUnitId = "K-9";

        function init() {
            // Mapa centrado en Mar del Plata
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([-38.0055, -57.5426], 15);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

            userMarker = L.circleMarker([-38.0055, -57.5426], {
                radius: 10, color: '#0066ff', fillColor: '#0066ff', fillOpacity: 0.8, weight: 3
            }).addTo(map).bindPopup("MI POSICIÓN");

            setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
            
            // Iniciar Rastreo GPS y Escucha de Base de Datos
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(updateGPS, (err) => console.log(err), { enableHighAccuracy: true });
            }
            listenForAlerts();
        }

        function updateGPS(pos) {
            const { latitude, longitude } = pos.coords;
            const myPos = [latitude, longitude];
            userMarker.setLatLng(myPos);

            if (activeAlert) {
                // Actualizar línea de ruta táctica
                if (routeLine) map.removeLayer(routeLine);
                routeLine = L.polyline([myPos, [activeAlert.lat, activeAlert.lng]], {
                    color: '#00f2ff', weight: 4, dashArray: '10, 10', opacity: 0.7
                }).addTo(map);

                // Calcular distancia exacta [cite: 2026-02-07]
                const distance = map.distance(myPos, [activeAlert.lat, activeAlert.lng]) / 1000;
                document.getElementById('target-dist').innerText = distance.toFixed(2) + " km";
            }
        }

        function listenForAlerts() {
            _client.channel(`patrulla-${myUnitId}`).on('postgres_changes', { 
                event: 'UPDATE', schema: 'public', table: 'alertas', filter: `unidad_asignada=eq.${myUnitId}` 
            }, (payload) => {
                if (payload.new.estado === 'en_proceso' || payload.new.estado === 'CRITICO') {
                    triggerTacticalMode(payload.new);
                }
            }).subscribe();
        }

        function triggerTacticalMode(data) {
            activeAlert = data;
            
            // 1. Alerta por Voz (No requiere mirar pantalla) [cite: 2026-02-07]
            const speech = new SpeechSynthesisUtterance(`Alerta Sentinel. Ciudadano ${data.nombre} requiere asistencia inmediata.`);
            window.speechSynthesis.speak(speech);
            
            // 2. Cambiar interfaz a modo Alerta (Radar Rojo)
            document.getElementById('main-body').classList.add('alerta-global-active');
            document.getElementById('action-panel').classList.remove('hidden');
            document.getElementById('video-overlay').classList.remove('hidden');
            
            // 3. Poblar datos
            document.getElementById('target-name').innerText = data.nombre;
            document.getElementById('target-bat').innerText = `${data.bateria || 0}%`;
            document.getElementById('user-link').innerText = data.nombre.split(' ')[0];

            // 4. Marcar en mapa
            if (alertMarker) map.removeLayer(alertMarker);
            alertMarker = L.circleMarker([data.lat, data.lng], { 
                radius: 15, color: '#ff3131', weight: 5, fillOpacity: 0.3 
            }).addTo(map);
            
            map.fitBounds([userMarker.getLatLng(), [data.lat, data.lng]], { padding: [100, 100] });
            
            // 5. Cargar Video Feed [cite: 2026-02-24]
            if (data.video_url) {
                const v = document.getElementById('video-player');
                v.src = data.video_url;
                v.play().catch(e => console.log("Video wait..."));
            }
        }

        function launchNav() {
            if (activeAlert) window.open(`https://www.google.com/maps/dir/?api=1&destination=${activeAlert.lat},${activeAlert.lng}&travelmode=driving`);
        }

        async function completeObjective() {
            if (!activeAlert) return;
            await _client.from('alertas').update({ estado: 'finalizado', activa: false }).eq('id', activeAlert.id);
            location.reload(); // Reset para volver a patrullar
        }

        async function requestBackup() {
            if (!activeAlert) return;
            await _client.from('alertas').update({ prioridad: 'REFUERZOS' }).eq('id', activeAlert.id);
            alert("⚠️ REFUERZOS SOLICITADOS AL CENTRO DE MANDO");
        }

        window.onload = init;
    </script>
</body>
</html>
