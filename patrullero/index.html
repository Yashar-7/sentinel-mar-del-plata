<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SENTINEL | UNIDAD TÁCTICA</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- Primero, cargar configuración -->
<script src="../config.js"></script>

<!-- Luego, Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    // Usar las claves desde config.js
    const _client = supabase.createClient(
        SENTINEL_CONFIG.SUPABASE_URL,
        SENTINEL_CONFIG.SUPABASE_KEY
    );
    
    // Para Google Maps
    const GOOGLE_API_KEY = SENTINEL_CONFIG.GOOGLE_MAPS_KEY;
</script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #00ffaa;
            --secondary: #0066ff;
            --alert: #ff3131;
            --bg: #020202;
            --panel-bg: rgba(10, 10, 10, 0.95);
        }

        body {
            background: var(--bg);
            color: var(--primary);
            font-family: 'Share Tech Mono', monospace;
            height: 100vh;
            overflow: hidden;
        }

        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: var(--panel-bg);
            border-bottom: 2px solid var(--primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo-box {
            width: 35px;
            height: 35px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            clip-path: polygon(0% 15%, 15% 0%, 85% 0%, 100% 15%, 100% 85%, 85% 100%, 15% 100%, 0% 85%);
        }
        .logo-text {
            font-weight: bold;
            font-size: 1.1rem;
        }
        .logo-sub {
            font-size: 0.6rem;
            opacity: 0.7;
        }

        #mapa {
            position: fixed;
            top: 60px;
            left: 0;
            right: 0;
            bottom: 250px;
            z-index: 1;
        }

        .panel-video {
            position: fixed;
            top: 70px;
            right: 10px;
            width: 160px;
            border: 2px solid var(--alert);
            background: #000;
            z-index: 500;
        }
        canvas {
            width: 100%;
            aspect-ratio: 4/3;
            display: block;
        }
        .live-tag {
            position: absolute;
            top: 5px;
            left: 5px;
            background: var(--alert);
            color: white;
            padding: 2px 8px;
            font-size: 0.6rem;
            animation: blink 1s infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }

        .panel-accion {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 250px;
            background: var(--panel-bg);
            border-top: 2px solid var(--secondary);
            backdrop-filter: blur(10px);
            padding: 15px;
            z-index: 1000;
            transform: translateY(100%);
            transition: transform 0.3s;
        }
        .panel-accion.visible { transform: translateY(0); }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 8px;
            font-size: 0.8rem;
            margin: 10px 0;
        }
        .label { opacity: 0.6; }
        .value { color: var(--primary); font-weight: bold; }
        .value.alert { color: var(--alert); }

        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }
        .btn {
            padding: 15px;
            background: transparent;
            border: 2px solid;
            color: inherit;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover { background: rgba(255,255,255,0.1); }
        .btn-nav { border-color: var(--secondary); color: var(--secondary); }
        .btn-arrive { border-color: #39ff14; color: #39ff14; }
        .btn-backup { grid-column: span 2; border-color: var(--alert); color: var(--alert); }

        #no-alerta {
            position: fixed;
            bottom: 100px;
            left: 0;
            right: 0;
            text-align: center;
            color: #333;
            font-size: 1rem;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <div class="logo-box"></div>
            <div>
                <div class="logo-text">SENTINEL</div>
                <div class="logo-sub">UNIDAD <span id="unidad-id">K-9</span></div>
            </div>
        </div>
        <div id="reloj">--:--:--</div>
    </header>

    <div id="mapa"></div>

    <div class="panel-video hidden" id="panel-video">
        <span class="live-tag">📹 EN VIVO</span>
        <canvas id="visor-video"></canvas>
    </div>

    <div class="panel-accion" id="panel-accion">
        <div style="color: var(--alert); text-align: center; margin-bottom: 10px;">🚨 INTERVENCIÓN TÁCTICA</div>
        <div class="info-grid">
            <span class="label">TIPO:</span><span class="value" id="tipo">--</span>
            <span class="label">CIUDADANO:</span><span class="value" id="nombre">--</span>
            <span class="label">UBICACIÓN:</span><span class="value" id="ubicacion">--</span>
            <span class="label">DISTANCIA:</span><span class="value" id="distancia">--</span>
        </div>
        <div class="btn-grid">
            <button class="btn btn-nav" onclick="toggleRuta()">🧭 VER RUTA</button>
            <button class="btn btn-arrive" onclick="llegue()">✅ LLEGUÉ</button>
            <button class="btn btn-backup" onclick="refuerzos()">⚠️ REFUERZOS</button>
        </div>
    </div>

    <div id="no-alerta">ESPERANDO ASIGNACIÓN TÁCTICA</div>

    <script>
        let mapa, userMarker, alertMarker, routeLine, activeAlert = null;
        let canalVideo = null;
        let rutaVisible = false;
        let miUnidad = "K-9";

        const canvas = document.getElementById('visor-video');
        const ctx = canvas.getContext('2d');

        function init() {
            mapa = L.map('mapa', { zoomControl: false, attributionControl: false }).setView([-38.0055, -57.5426], 15);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(mapa);

            userMarker = L.circleMarker([-38.0055, -57.5426], {
                radius: 12, color: '#0066ff', fillColor: '#0066ff', fillOpacity: 0.8
            }).addTo(mapa).bindPopup('🚓 MI UNIDAD');

            setInterval(() => {
                document.getElementById('reloj').innerText = new Date().toLocaleTimeString();
            }, 1000);

            navigator.geolocation.watchPosition(updateGPS, null, { enableHighAccuracy: true });
            escucharAsignaciones();
        }

        function updateGPS(pos) {
            const { latitude, longitude } = pos.coords;
            userMarker.setLatLng([latitude, longitude]);

            if (activeAlert && rutaVisible) {
                if (routeLine) mapa.removeLayer(routeLine);
                routeLine = L.polyline([[latitude, longitude], [activeAlert.lat, activeAlert.lng]], {
                    color: '#00f2ff', weight: 4, dashArray: '10, 10'
                }).addTo(mapa);
                
                const dist = mapa.distance([latitude, longitude], [activeAlert.lat, activeAlert.lng]) / 1000;
                document.getElementById('distancia').innerText = dist.toFixed(2) + ' km';
            }
        }

        function escucharAsignaciones() {
            _client
                .channel(`patrulla-${miUnidad}`)
                .on('postgres_changes', { 
                    event: 'UPDATE', 
                    schema: 'public', 
                    table: 'alertas', 
                    filter: `unidad_asignada=eq.${miUnidad}` 
                }, payload => {
                    if (payload.new.estado === 'en_proceso' || payload.new.estado === 'CRITICO') {
                        activarAlerta(payload.new);
                    }
                })
                .subscribe();
        }

        function activarAlerta(alerta) {
    console.log("🚨 Activando alerta en patrullero", alerta);
    activeAlert = alerta;
    
    // ... resto del código ...
    
    // Sintonizar video con logs
    console.log("📡 Conectando a canal:", `alerta-${alerta.id}`);
    if (canalVideo) canalVideo.unsubscribe();
    
    canalVideo = _client.channel(`alerta-${alerta.id}`);
    canalVideo.on('broadcast', { event: 'video-frame' }, payload => {
        console.log("📹 Frame recibido", payload);
        const img = new Image();
        img.onload = () => {
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0);
            console.log("✅ Frame dibujado");
        };
        img.onerror = (err) => console.error("❌ Error cargando imagen:", err);
        img.src = payload.payload.frame;
    }).subscribe();
}

        function toggleRuta() {
            rutaVisible = !rutaVisible;
            
            if (rutaVisible && activeAlert) {
                const userPos = userMarker.getLatLng();
                
                if (routeLine) mapa.removeLayer(routeLine);
                routeLine = L.polyline([userPos, [activeAlert.lat, activeAlert.lng]], {
                    color: '#00f2ff',
                    weight: 4,
                    dashArray: '10, 10'
                }).addTo(mapa);
                
                const dist = mapa.distance(userPos, [activeAlert.lat, activeAlert.lng]) / 1000;
                document.getElementById('distancia').innerText = dist.toFixed(2) + ' km';
                
            } else if (routeLine) {
                mapa.removeLayer(routeLine);
                routeLine = null;
            }
        }

        function llegue() { 
            alert('✅ LLEGADA CONFIRMADA'); 
            // Aquí se podría actualizar la alerta
            location.reload(); 
        }
        
        function refuerzos() { 
            alert('⚠️ REFUERZOS SOLICITADOS'); 
        }

        window.onload = init;
    </script>
</body>
</html>
