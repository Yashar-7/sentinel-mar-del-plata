<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SENTINEL | UNIDAD DE RESPUESTA TÁCTICA</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #00ffaa; /* Verde Neón */
            --secondary: #0066ff; /* Azul Eléctrico */
            --alert: #ff3131; /* Rojo Crítico */
            --bg: #050505;
            --panel-bg: rgba(10, 15, 20, 0.95);
        }

        body {
            background: var(--bg);
            color: var(--primary);
            font-family: 'Share Tech Mono', 'Courier New', monospace;
            height: 100vh;
            overflow: hidden;
        }

        /* EFECTO DE ALERTA CRÍTICA */
        .alerta-global-active {
            animation: pulse-border 1.5s infinite;
        }
        @keyframes pulse-border {
            0% { box-shadow: inset 0 0 20px var(--alert); }
            50% { box-shadow: inset 0 0 50px rgba(255, 49, 49, 0.5); }
            100% { box-shadow: inset 0 0 20px var(--alert); }
        }

        header {
            position: fixed; top: 0; left: 0; right: 0; height: 60px;
            background: var(--panel-bg); border-bottom: 2px solid var(--primary);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 15px; z-index: 2000;
        }

        .unidad-info { display: flex; align-items: center; gap: 12px; }
        .status-dot { width: 10px; height: 10px; background: var(--primary); border-radius: 50%; box-shadow: 0 0 10px var(--primary); }

        #map { position: fixed; top: 60px; left: 0; right: 0; bottom: 0; z-index: 1; }

        /* PANEL TÁCTICO FLOTANTE */
        .tactical-overlay {
            position: fixed; top: 75px; right: 10px; width: 180px;
            background: var(--panel-bg); border: 1px solid var(--secondary);
            z-index: 1500; padding: 5px; clip-path: polygon(10% 0, 100% 0, 100% 90%, 90% 100%, 0 100%, 0 10%);
        }

        .video-feed-container {
            width: 100%; height: 120px; background: #000;
            border: 1px solid var(--alert); display: flex;
            align-items: center; justify-content: center; position: relative;
        }

        .live-label {
            position: absolute; top: 5px; left: 5px; color: var(--alert);
            font-size: 0.6rem; font-weight: bold; animation: blink 1s infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }

        /* PANEL DE ACCIÓN INFERIOR */
        .action-panel {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--panel-bg); border-top: 2px solid var(--secondary);
            z-index: 2000; padding: 15px; transition: transform 0.4s ease-in-out;
        }

        .action-panel.hidden { transform: translateY(100%); }

        .info-header { color: var(--alert); margin-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px; }

        .data-row { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 4px; }
        .data-label { opacity: 0.6; }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn {
            padding: 15px; border: 2px solid; background: transparent;
            color: inherit; font-family: inherit; font-weight: bold; cursor: pointer;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-nav { border-color: var(--secondary); color: var(--secondary); }
        .btn-arrive { border-color: #39ff14; color: #39ff14; }
        .btn-backup { grid-column: span 2; border-color: var(--alert); color: var(--alert); }

        #video-player { width: 100%; height: 100%; object-fit: cover; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body id="main-body">

    <header>
        <div class="unidad-info">
            <div class="status-dot"></div>
            <span style="letter-spacing: 2px;">SENTINEL: UNIT <strong id="unit-tag">K-9</strong></span>
        </div>
        <div id="clock" style="font-size: 0.8rem; opacity: 0.7;">21:51:22</div>
    </header>

    <div id="map"></div>

    <div class="tactical-overlay hidden" id="video-overlay">
        <div class="video-feed-container">
            <span class="live-label">● LIVE FEED</span>
            <video id="video-player" autoplay playsinline muted></video>
        </div>
        <div style="font-size: 0.6rem; padding: 5px; text-align: center;">Vínculo: Ciudadano <span id="user-link">--</span></div>
    </div>

    <div class="action-panel hidden" id="action-panel">
        <div class="info-header">🚨 INTERVENCIÓN EN CURSO</div>
        <div class="data-row"><span class="data-label">OBJETIVO:</span> <span id="target-name">--</span></div>
        <div class="data-row"><span class="data-label">DNI:</span> <span id="target-dni">--</span></div>
        <div class="data-row"><span class="data-label">UBICACIÓN:</span> <span id="target-addr">CALCULANDO RUTA...</span></div>
        <div class="data-row"><span class="data-label">BATERÍA DISP:</span> <span id="target-bat" style="color: var(--alert);">--</span></div>
        <div class="data-row"><span class="data-label">DISTANCIA:</span> <span id="target-dist">--</span></div>

        <div class="btn-grid">
            <button class="btn btn-nav" onclick="launchNavigation()">🧭 RUTA GPS</button>
            <button class="btn btn-arrive" onclick="completeObjective()">✅ LLEGADA</button>
            <button class="btn btn-backup" onclick="requestBackup()">⚠️ PEDIR REFUERZOS</button>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN SUPABASE
        const SB_URL = 'https://svpurpvbiujhcbiugrkh.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN2cHVycHZiaXVqaGNiaXVncmtoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc3NDgzMTUsImV4cCI6MjA4MzMyNDMxNX0.AivKJ0_N0z_4T4vLNfUcE2hepJ1XXOO8-4fSA3PJXdc';
        const _client = supabase.createClient(SB_URL, SB_KEY);

        let map, userMarker, alertMarker, routeLine;
        let activeAlert = null;
        let myUnitId = "K-9";
        let watchId = null;
        let videoCanal = null;

        function init() {
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([-38.0055, -57.5426], 15);
            
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

            userMarker = L.circleMarker([-38.0055, -57.5426], {
                radius: 10, color: '#0066ff', fillColor: '#0066ff', fillOpacity: 0.8, weight: 3
            }).addTo(map).bindPopup('🚓 MI POSICIÓN');

            setInterval(() => { 
                document.getElementById('clock').innerText = new Date().toLocaleTimeString(); 
            }, 1000);
            
            // Iniciar GPS
            iniciarGPSPatrullero();
            
            // Escuchar asignaciones
            listenForTacticalAssignments();
        }

        // ==============================================
        // GPS EN TIEMPO REAL DEL PATRULLERO
        // ==============================================
        function iniciarGPSPatrullero() {
            if (!navigator.geolocation) {
                console.error("GPS no soportado");
                return;
            }

            watchId = navigator.geolocation.watchPosition(
                (pos) => {
                    const { latitude, longitude } = pos.coords;
                    userMarker.setLatLng([latitude, longitude]);
                    
                    // Actualizar ruta si hay alerta activa
                    if (activeAlert && routeLine) {
                        map.removeLayer(routeLine);
                        routeLine = L.polyline([
                            [latitude, longitude],
                            [activeAlert.lat, activeAlert.lng]
                        ], { color: '#00f2ff', weight: 4, dashArray: '10, 10', opacity: 0.7 }).addTo(map);
                        
                        // Calcular distancia
                        const dist = calcularDistancia(latitude, longitude, activeAlert.lat, activeAlert.lng);
                        document.getElementById('target-dist').innerText = `${dist.toFixed(1)} km`;
                    }
                },
                (error) => {
                    console.error("Error GPS:", error);
                },
                { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 }
            );
        }

        function calcularDistancia(lat1, lon1, lat2, lon2) {
            const R = 6371; // Radio de la Tierra en km
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        // ==============================================
        // RECEPCIÓN DE ASIGNACIONES
        // ==============================================
        function listenForTacticalAssignments() {
            _client.channel(`patrulla-${myUnitId}`)
                .on('postgres_changes', { 
                    event: 'UPDATE', schema: 'public', table: 'alertas', 
                    filter: `unidad_asignada=eq.${myUnitId}` 
                }, (payload) => {
                    if (payload.new.estado === 'en_proceso' || payload.new.estado === 'CRITICO') {
                        triggerTacticalAlert(payload.new);
                    }
                }).subscribe();
        }

        // ==============================================
        // ACTIVAR ALERTA TÁCTICA
        // ==============================================
        function triggerTacticalAlert(data) {
            try {
                activeAlert = data;
                
                // 1. Alerta por Voz (Hands-Free)
                const msg = new SpeechSynthesisUtterance(`Alerta de emergencia. Ciudadano ${data.nombre} en peligro. Proceda a la ubicación.`);
                window.speechSynthesis.speak(msg);

                // 2. Efecto Visual
                document.getElementById('main-body').classList.add('alerta-global-active');
                document.getElementById('action-panel').classList.remove('hidden');
                document.getElementById('video-overlay').classList.remove('hidden');

                // 3. Cargar Datos
                document.getElementById('target-name').innerText = data.nombre;
                document.getElementById('target-dni').innerText = data.dni;
                document.getElementById('target-bat').innerText = `${data.bateria || 0}%`;
                document.getElementById('user-link').innerText = data.nombre.split(' ')[0];

                // 4. Actualizar Mapa
                updateMapTactical(data.lat, data.lng);
                
                // 5. Escuchar video en tiempo real
                escucharVideo(data.id);
                
            } catch (error) {
                console.error("Error en alerta táctica:", error);
            }
        }

        // ==============================================
        // ESCUCHAR VIDEO EN TIEMPO REAL
        // ==============================================
        function escucharVideo(idAlerta) {
            if (videoCanal) {
                _client.removeChannel(videoCanal);
            }
            
            videoCanal = _client
                .channel(`video-${idAlerta}`)
                .on('postgres_changes', {
                    event: 'UPDATE',
                    schema: 'public',
                    table: 'alertas',
                    filter: `id=eq.${idAlerta}`
                }, (payload) => {
                    const video = document.getElementById('video-player');
                    if (payload.new.video_url && payload.new.video_url !== video.src) {
                        video.src = payload.new.video_url;
                        video.load();
                        video.play().catch(e => console.log("Auto-play bloqueado"));
                    }
                })
                .subscribe();
        }

        // ==============================================
        // ACTUALIZAR MAPA
        // ==============================================
        function updateMapTactical(lat, lng) {
            if (alertMarker) map.removeLayer(alertMarker);
            alertMarker = L.circleMarker([lat, lng], {
                radius: 15, color: '#ff3131', fillColor: '#ff3131', fillOpacity: 0.4, weight: 5
            }).addTo(map);

            if (routeLine) map.removeLayer(routeLine);
            routeLine = L.polyline([userMarker.getLatLng(), [lat, lng]], {
                color: '#00f2ff', weight: 4, dashArray: '10, 10', opacity: 0.7
            }).addTo(map);

            map.fitBounds([userMarker.getLatLng(), [lat, lng]], { padding: [80, 80] });
            
            // Calcular distancia inicial
            const userPos = userMarker.getLatLng();
            const dist = calcularDistancia(userPos.lat, userPos.lng, lat, lng);
            document.getElementById('target-dist').innerText = `${dist.toFixed(1)} km`;
        }

        // ==============================================
        // ACCIONES DEL PATRULLERO
        // ==============================================
        function launchNavigation() {
            if (!activeAlert) return;
            window.open(`https://www.google.com/maps/dir/?api=1&destination=${activeAlert.lat},${activeAlert.lng}&travelmode=driving`, '_blank');
        }

        async function requestBackup() {
            if (!activeAlert) return;
            if (!confirm("¿SOLICITAR REFUERZOS INMEDIATOS A ESTA POSICIÓN?")) return;
            
            try {
                await _client.from('alertas').update({ 
                    prioridad: 'REFUERZOS_REQUERIDOS',
                    solicitud_refuerzos: new Date().toISOString()
                }).eq('id', activeAlert.id);
                
                alert("✅ SOPORTE EN CAMINO");
            } catch (error) {
                console.error("Error solicitando refuerzos:", error);
                alert("❌ ERROR AL SOLICITAR REFUERZOS");
            }
        }

        async function completeObjective() {
            if (!activeAlert) return;
            
            try {
                await _client.from('alertas').update({ 
                    estado: 'finalizado', 
                    activa: false, 
                    hora_llegada: new Date().toISOString() 
                }).eq('id', activeAlert.id);

                // Reset UI
                document.getElementById('main-body').classList.remove('alerta-global-active');
                document.getElementById('action-panel').classList.add('hidden');
                document.getElementById('video-overlay').classList.add('hidden');
                
                if (alertMarker) map.removeLayer(alertMarker);
                if (routeLine) map.removeLayer(routeLine);
                
                if (videoCanal) {
                    _client.removeChannel(videoCanal);
                    videoCanal = null;
                }
                
                activeAlert = null;
                
            } catch (error) {
                console.error("Error completando objetivo:", error);
                alert("❌ ERROR AL CONFIRMAR LLEGADA");
            }
        }

        // ==============================================
        // LIMPIEZA AL CERRAR
        // ==============================================
        window.addEventListener('beforeunload', () => {
            if (watchId) navigator.geolocation.clearWatch(watchId);
            if (videoCanal) _client.removeChannel(videoCanal);
        });

        window.onload = init;
    </script>
</body>
</html>
