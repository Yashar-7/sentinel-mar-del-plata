<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SENTINEL | UNIDAD DE RESPUESTA TÁCTICA</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #00ffaa;
            --secondary: #0066ff;
            --alert: #ff3131;
            --success: #39ff14;
            --bg: #050505;
            --panel-bg: rgba(10, 15, 20, 0.95);
        }

        body {
            background: var(--bg);
            color: var(--primary);
            font-family: 'Share Tech Mono', 'Courier New', monospace;
            height: 100vh;
            overflow: hidden;
        }

        /* EFECTO DE ALERTA CRÍTICA */
        .alerta-global-active {
            animation: pulse-border 1.5s infinite;
        }
        @keyframes pulse-border {
            0% { box-shadow: inset 0 0 20px var(--alert); }
            50% { box-shadow: inset 0 0 50px rgba(255, 49, 49, 0.5); }
            100% { box-shadow: inset 0 0 20px var(--alert); }
        }

        header {
            position: fixed; top: 0; left: 0; right: 0; height: 60px;
            background: var(--panel-bg); border-bottom: 2px solid var(--primary);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 15px; z-index: 2000;
        }

        .unidad-info { display: flex; align-items: center; gap: 12px; }
        .status-dot { width: 10px; height: 10px; background: var(--primary); border-radius: 50%; animation: blink 1.5s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }

        #map { position: fixed; top: 60px; left: 0; right: 0; bottom: 220px; z-index: 1; }

        /* PANEL TÁCTICO FLOTANTE */
        .tactical-overlay {
            position: fixed; top: 75px; right: 10px; width: 200px;
            background: var(--panel-bg); border: 1px solid var(--secondary);
            z-index: 1500; padding: 8px; clip-path: polygon(10% 0, 100% 0, 100% 90%, 90% 100%, 0 100%, 0 10%);
            backdrop-filter: blur(5px);
            transition: all 0.3s;
        }

        .video-feed-container {
            width: 100%; height: 130px; background: #000;
            border: 1px solid var(--alert); display: flex;
            align-items: center; justify-content: center; position: relative;
        }

        .live-label {
            position: absolute; top: 5px; left: 5px; color: var(--alert);
            font-size: 0.6rem; font-weight: bold; animation: blink 1s infinite;
            background: rgba(0,0,0,0.5); padding: 2px 5px;
        }

        /* PANEL DE ACCIÓN INFERIOR */
        .action-panel {
            position: fixed; bottom: 0; left: 0; right: 0; height: 220px;
            background: var(--panel-bg); border-top: 2px solid var(--secondary);
            z-index: 2000; padding: 15px; backdrop-filter: blur(10px);
            transition: transform 0.4s ease-in-out;
            overflow-y: auto;
        }

        .action-panel.hidden { transform: translateY(100%); }

        .info-header { 
            color: var(--alert); margin-bottom: 10px; 
            border-bottom: 1px solid var(--alert); padding-bottom: 5px;
            font-size: 1.1rem; display: flex; justify-content: space-between;
        }

        .info-grid {
            display: grid; grid-template-columns: 1fr 2fr; gap: 8px;
            font-size: 0.85rem; margin-bottom: 10px;
        }

        .data-label { opacity: 0.6; }
        .data-value { color: var(--primary); font-weight: bold; }
        .data-value.alert { color: var(--alert); }

        .btn-grid { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 8px; 
            margin-top: 10px;
        }
        .btn {
            padding: 12px; border: 2px solid; background: transparent;
            color: inherit; font-family: inherit; font-weight: bold; cursor: pointer;
            text-transform: uppercase; letter-spacing: 1px; font-size: 0.8rem;
            transition: all 0.3s;
        }
        .btn:hover { background: rgba(255,255,255,0.1); }
        .btn-nav { border-color: var(--secondary); color: var(--secondary); }
        .btn-arrive { border-color: var(--success); color: var(--success); }
        .btn-backup { grid-column: span 2; border-color: var(--alert); color: var(--alert); }

        #video-player { width: 100%; height: 100%; object-fit: cover; }
        
        .hidden { display: none !important; }

        /* ESTADO SIN ALERTA */
        .no-alerta {
            text-align: center; color: rgba(255,255,255,0.3);
            padding: 20px; font-size: 1rem;
        }
    </style>
</head>
<body id="main-body">

    <header>
        <div class="unidad-info">
            <div class="status-dot"></div>
            <span style="letter-spacing: 2px;">SENTINEL: UNIT <strong id="unit-tag">K-9</strong></span>
        </div>
        <div id="clock" style="font-size: 0.8rem; opacity: 0.7;"></div>
    </header>

    <div id="map"></div>

    <!-- Overlay de video (visible solo con alerta) -->
    <div class="tactical-overlay hidden" id="video-overlay">
        <div class="video-feed-container">
            <span class="live-label">● EN VIVO</span>
            <video id="video-player" autoplay playsinline muted></video>
        </div>
        <div style="font-size: 0.65rem; padding: 8px 5px; text-align: center; color: var(--primary);">
            📹 FEED CIUDADANO: <span id="user-link">--</span>
        </div>
    </div>

    <!-- Panel de acción inferior (visible solo con alerta) -->
    <div class="action-panel hidden" id="action-panel">
        <div class="info-header">
            <span>🚨 INTERVENCIÓN TÁCTICA</span>
            <span id="tipo-alerta" style="color: var(--alert);">ROBO</span>
        </div>
        
        <div class="info-grid">
            <span class="data-label">OBJETIVO:</span>
            <span class="data-value" id="target-name">--</span>
            
            <span class="data-label">DNI:</span>
            <span class="data-value" id="target-dni">--</span>
            
            <span class="data-label">CONTACTO:</span>
            <span class="data-value" id="target-tel">--</span>
            
            <span class="data-label">UBICACIÓN:</span>
            <span class="data-value" id="target-addr">--</span>
            
            <span class="data-label">BATERÍA:</span>
            <span class="data-value alert" id="target-bat">--</span>
            
            <span class="data-label">DISTANCIA:</span>
            <span class="data-value" id="target-dist">--</span>
        </div>

        <div class="btn-grid">
            <button class="btn btn-nav" onclick="launchNavigation()">🧭 NAVEGAR</button>
            <button class="btn btn-arrive" onclick="completeObjective()">✅ LLEGUÉ</button>
            <button class="btn btn-backup" onclick="requestBackup()">⚠️ REFUERZOS</button>
        </div>
    </div>

    <!-- Mensaje cuando no hay alertas -->
    <div id="no-alerta" style="position: fixed; bottom: 80px; left: 0; right: 0; text-align: center; color: rgba(255,255,255,0.3); pointer-events: none;">
        ESPERANDO ASIGNACIÓN TÁCTICA
    </div>

    <script>
        // CONFIGURACIÓN SUPABASE
        const SB_URL = 'https://svpurpvbiujhcbiugrkh.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN2cHVycHZiaXVqaGNiaXVncmtoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc3NDgzMTUsImV4cCI6MjA4MzMyNDMxNX0.AivKJ0_N0z_4T4vLNfUcE2hepJ1XXOO8-4fSA3PJXdc';
        const _client = supabase.createClient(SB_URL, SB_KEY);

        let map, userMarker, alertMarker, routeLine;
        let activeAlert = null;
        let myUnitId = "K-9";
        let watchId = null;
        let videoCanal = null;

        // ==============================================
        // INICIALIZACIÓN
        // ==============================================
        function init() {
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([-38.0055, -57.5426], 15);
            
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

            userMarker = L.circleMarker([-38.0055, -57.5426], {
                radius: 12, color: '#0066ff', fillColor: '#0066ff', fillOpacity: 0.8, weight: 3
            }).addTo(map).bindPopup('🚓 MI POSICIÓN');

            // Reloj
            setInterval(() => { 
                document.getElementById('clock').innerText = new Date().toLocaleTimeString(); 
            }, 1000);
            
            iniciarGPSPatrullero();
            listenForTacticalAssignments();
        }

        // ==============================================
        // GPS EN TIEMPO REAL
        // ==============================================
        function iniciarGPSPatrullero() {
            if (!navigator.geolocation) {
                console.error("GPS no soportado");
                return;
            }

            watchId = navigator.geolocation.watchPosition(
                (pos) => {
                    const { latitude, longitude } = pos.coords;
                    userMarker.setLatLng([latitude, longitude]);
                    
                    if (activeAlert && routeLine) {
                        map.removeLayer(routeLine);
                        routeLine = L.polyline([
                            [latitude, longitude],
                            [activeAlert.lat, activeAlert.lng]
                        ], { color: '#00f2ff', weight: 4, dashArray: '10, 10', opacity: 0.7 }).addTo(map);
                        
                        const dist = calcularDistancia(latitude, longitude, activeAlert.lat, activeAlert.lng);
                        document.getElementById('target-dist').innerText = `${dist.toFixed(1)} km`;
                    }
                },
                (error) => console.error("Error GPS:", error),
                { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 }
            );
        }

        function calcularDistancia(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        // ==============================================
        // RECEPCIÓN DE ASIGNACIONES
        // ==============================================
        function listenForTacticalAssignments() {
            console.log("🚔 Escuchando asignaciones para unidad:", myUnitId);
            
            _client.channel(`patrulla-${myUnitId}`)
                .on('postgres_changes', { 
                    event: 'UPDATE', 
                    schema: 'public', 
                    table: 'alertas', 
                    filter: `unidad_asignada=eq.${myUnitId}` 
                }, (payload) => {
                    console.log("📡 CAMBIO DETECTADO:", payload);
                    if (payload.new.estado === 'en_proceso' || payload.new.estado === 'CRITICO') {
                        triggerTacticalAlert(payload.new);
                    }
                })
                .subscribe((status) => {
                    console.log("📡 Estado del canal:", status);
                });
        }

        // ==============================================
        // ACTIVAR ALERTA TÁCTICA (VERSIÓN MEJORADA)
        // ==============================================
        function triggerTacticalAlert(data) {
            try {
                activeAlert = data;
                
                // 1. Alerta por voz
                try {
                    const msg = new SpeechSynthesisUtterance(`Alerta de emergencia. Ciudadano ${data.nombre} en peligro. Proceda a la ubicación.`);
                    window.speechSynthesis.speak(msg);
                } catch (e) {}

                // 2. Efecto visual
                document.getElementById('main-body').classList.add('alerta-global-active');
                
                // 3. Mostrar paneles
                document.getElementById('action-panel').classList.remove('hidden');
                document.getElementById('video-overlay').classList.remove('hidden');
                
                // 4. Ocultar mensaje de "sin alerta"
                document.getElementById('no-alerta').style.display = 'none';

                // 5. Cargar datos en el panel
                document.getElementById('target-name').innerText = data.nombre || '--';
                document.getElementById('target-dni').innerText = data.dni || '--';
                document.getElementById('target-tel').innerText = data.telefono || '--';
                document.getElementById('target-bat').innerText = `${data.bateria || 0}%`;
                document.getElementById('user-link').innerText = (data.nombre || 'Ciudadano').split(' ')[0];
                document.getElementById('tipo-alerta').innerText = data.tipo || 'EMERGENCIA';
                
                // Ubicación formateada
                const ubicacion = `${data.lat ? data.lat.toFixed(5) : '--'}, ${data.lng ? data.lng.toFixed(5) : '--'}`;
                document.getElementById('target-addr').innerText = ubicacion;

                // 6. Actualizar mapa
                updateMapTactical(data.lat, data.lng);
                
                // 7. Escuchar video
                escucharVideo(data.id);
                
            } catch (error) {
                console.error("Error en alerta táctica:", error);
            }
        }

        // ==============================================
        // ACTUALIZAR MAPA (VERSIÓN MEJORADA)
        // ==============================================
        function updateMapTactical(lat, lng) {
            if (!map || !userMarker) return;
            
            // Marcador de la alerta
            if (alertMarker) map.removeLayer(alertMarker);
            alertMarker = L.circleMarker([lat, lng], {
                radius: 16,
                color: '#ff3131',
                fillColor: '#ff3131',
                fillOpacity: 0.6,
                weight: 4,
                className: 'pulse-marker'
            }).addTo(map).bindPopup('🚨 ALERTA');

            // Ruta
            const userPos = userMarker.getLatLng();
            if (routeLine) map.removeLayer(routeLine);
            routeLine = L.polyline([userPos, [lat, lng]], {
                color: '#00f2ff',
                weight: 4,
                dashArray: '10, 10',
                opacity: 0.8
            }).addTo(map);

            // Centrar mapa
            map.fitBounds([userPos, [lat, lng]], { padding: [80, 80] });
            
            // Distancia inicial
            const dist = calcularDistancia(userPos.lat, userPos.lng, lat, lng);
            document.getElementById('target-dist').innerText = `${dist.toFixed(1)} km`;
        }

        // ==============================================
        // VIDEO EN TIEMPO REAL
        // ==============================================
        function escucharVideo(idAlerta) {
            if (videoCanal) _client.removeChannel(videoCanal);
            
            videoCanal = _client
                .channel(`video-${idAlerta}`)
                .on('postgres_changes', {
                    event: 'UPDATE',
                    schema: 'public',
                    table: 'alertas',
                    filter: `id=eq.${idAlerta}`
                }, (payload) => {
                    const video = document.getElementById('video-player');
                    if (payload.new.video_url && payload.new.video_url !== video.src) {
                        video.src = payload.new.video_url;
                        video.load();
                        video.play().catch(e => console.log("Auto-play bloqueado"));
                    }
                })
                .subscribe();
        }

        // ==============================================
        // ACCIONES DEL PATRULLERO
        // ==============================================
        function launchNavigation() {
            if (!activeAlert) return;
            window.open(`https://www.google.com/maps/dir/?api=1&destination=${activeAlert.lat},${activeAlert.lng}&travelmode=driving`, '_blank');
        }

        async function requestBackup() {
            if (!activeAlert) return;
            if (!confirm("¿SOLICITAR REFUERZOS INMEDIATOS A ESTA POSICIÓN?")) return;
            
            try {
                await _client.from('alertas').update({ 
                    prioridad: 'REFUERZOS_REQUERIDOS',
                    solicitud_refuerzos: new Date().toISOString()
                }).eq('id', activeAlert.id);
                alert("✅ SOPORTE EN CAMINO");
            } catch (error) {
                console.error("Error solicitando refuerzos:", error);
                alert("❌ ERROR AL SOLICITAR REFUERZOS");
            }
        }

        async function completeObjective() {
            if (!activeAlert) return;
            
            try {
                await _client.from('alertas').update({ 
                    estado: 'finalizado', 
                    activa: false, 
                    hora_llegada: new Date().toISOString() 
                }).eq('id', activeAlert.id);

                // Reset UI
                document.getElementById('main-body').classList.remove('alerta-global-active');
                document.getElementById('action-panel').classList.add('hidden');
                document.getElementById('video-overlay').classList.add('hidden');
                document.getElementById('no-alerta').style.display = 'block';
                
                if (alertMarker) map.removeLayer(alertMarker);
                if (routeLine) map.removeLayer(routeLine);
                
                if (videoCanal) {
                    _client.removeChannel(videoCanal);
                    videoCanal = null;
                }
                
                activeAlert = null;
                
            } catch (error) {
                console.error("Error completando objetivo:", error);
                alert("❌ ERROR AL CONFIRMAR LLEGADA");
            }
        }

        // ==============================================
        // LIMPIEZA
        // ==============================================
        window.addEventListener('beforeunload', () => {
            if (watchId) navigator.geolocation.clearWatch(watchId);
            if (videoCanal) _client.removeChannel(videoCanal);
        });

        window.onload = init;
    </script>
</body>
</html>
