<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CITY_VIVA | CIUDADANO</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-red: #ff003c;
            --neon-orange: #ff8c00;
            --neon-green: #39ff14;
            --bg-dark: #0a0a0c;
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background: var(--bg-dark); font-family: 'Share Tech Mono', monospace; 
            color: white; overflow: hidden;
        }

        /* Mapa con Filtro Inverso / Cyberpunk */
        #map { 
            height: 100vh; width: 100vw; 
            filter: invert(100%) hue-rotate(180deg) brightness(0.5) contrast(1.2); 
        }

        /* Overlay de Interfaz */
        .hud {
            position: absolute; inset: 0; z-index: 1000;
            pointer-events: none; display: flex; flex-direction: column; justify-content: space-between;
        }

        .hud-header {
            padding: 15px; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            display: flex; justify-content: space-between; pointer-events: auto;
        }

        .hud-footer {
            padding: 20px; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            pointer-events: auto;
        }

        /* Consola de Estado */
        #console {
            font-size: 10px; color: var(--neon-blue); height: 60px; overflow: hidden;
            margin-bottom: 10px; border-left: 2px solid var(--neon-blue); padding-left: 10px;
        }

        /* Botonera de Alertas */
        .alert-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
        }

        .btn-alert {
            background: rgba(255, 255, 255, 0.05); border: 1px solid var(--neon-blue);
            color: var(--neon-blue); padding: 15px 5px; font-size: 0.7rem; text-align: center;
            cursor: pointer; transition: 0.2s; text-transform: uppercase;
        }

        .btn-alert:active { background: var(--neon-blue); color: black; }

        .btn-panic {
            grid-column: span 3; background: rgba(255, 0, 60, 0.2); 
            border: 2px solid var(--neon-red); color: var(--neon-red);
            font-size: 1.2rem; height: 70px; font-weight: bold; margin-top: 10px;
            animation: pulse-border 1.5s infinite alternate;
        }

        @keyframes pulse-border {
            from { box-shadow: 0 0 5px var(--neon-red); }
            to { box-shadow: 0 0 20px var(--neon-red); }
        }

        /* Visor de Cámara */
        #camera-preview {
            position: absolute; top: 80px; right: 15px; width: 120px; height: 160px;
            border: 1px solid var(--neon-blue); background: black; display: none;
            overflow: hidden; box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
        }
        video { width: 100%; height: 100%; object-fit: cover; }

        .hidden { display: none; }
        
        .badge { font-size: 0.6rem; padding: 2px 5px; border: 1px solid; border-radius: 3px; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="hud">
        <div class="hud-header">
            <div>
                <div style="font-size: 1.2rem; font-weight: bold; color: var(--neon-blue);">SMART_TECH [VIVA]</div>
                <div style="font-size: 0.7rem;">ID: <span id="user-id">OFFLINE</span> | <span id="battery">--%</span> BAT</div>
            </div>
            <div style="text-align: right;">
                <div class="badge" style="color: var(--neon-green); border-color: var(--neon-green);">GPS_ONLINE</div>
                <div id="clock" style="font-size: 0.8rem; margin-top: 5px;">00:00:00</div>
            </div>
        </div>

        <div id="camera-preview">
            <div style="position:absolute; top:5px; left:5px; color:red; font-size:10px; z-index:10;">● REC</div>
            <video id="video-feed" autoplay playsinline muted></video>
        </div>

        <div class="hud-footer">
            <div id="console"></div>
            
            <div class="alert-grid">
                <div class="btn-alert" onclick="prepararAlerta('ROBO')">🛡️ ROBO</div>
                <div class="btn-alert" onclick="prepararAlerta('INCENDIO')">🔥 FUEGO</div>
                <div class="btn-alert" onclick="prepararAlerta('MEDICA')">🚑 MEDICA</div>
                <div class="btn-alert" onclick="prepararAlerta('ACCIDENTE')">🚗 CHOQUE</div>
                <div class="btn-alert" onclick="prepararAlerta('DISTURBIO')">👥 SAQUEO</div>
                <div class="btn-alert" onclick="prepararAlerta('VIOLENCIA')">⚠️ VIOLENCIA</div>
                
                <button class="btn-alert btn-panic" id="panic-master" onclick="lanzarAlertaCritica()">PANICO TOTAL</button>
            </div>
        </div>
    </div>

    <script>
        // Configuración Supabase
        const SUPABASE_URL = "TU_URL";
        const SUPABASE_KEY = "TU_KEY";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let map, userMarker, userLocation, stream;
        let isAlertActive = false;
        let lastAlertId = null;

        // --- INICIO ---
        function init() {
            log("SISTEMA INICIADO...");
            updateClock();
            setInterval(updateClock, 1000);
            
            // Inicializar Mapa
            map = L.map('map', { zoomControl: false }).setView([-38.0055, -57.5426], 16);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

            startTracking();
            getBattery();
            checkSession();
        }

        async function checkSession() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (session) {
                document.getElementById('user-id').textContent = session.user.id.substring(0, 8);
                log("CONEXIÓN ENCRIPTADA OK.");
            }
        }

        // --- GEOLOCALIZACIÓN ---
        function startTracking() {
            navigator.geolocation.watchPosition(pos => {
                const { latitude, longitude } = pos.coords;
                userLocation = { lat: latitude, lng: longitude };
                
                if (!userMarker) {
                    userMarker = L.circleMarker([latitude, longitude], {
                        radius: 8, color: '#00f2ff', fillColor: '#00f2ff', fillOpacity: 0.5
                    }).addTo(map);
                } else {
                    userMarker.setLatLng([latitude, longitude]);
                }
                map.panTo([latitude, longitude]);

                if (isAlertActive) updateLiveLocation(latitude, longitude);

            }, null, { enableHighAccuracy: true });
        }

        // --- SISTEMA DE ALERTAS ---
        async function prepararAlerta(tipo) {
            if (isAlertActive) return;
            log(`SOLICITANDO AUXILIO: ${tipo}...`);
            await activarAlerta(tipo);
        }

        async function lanzarAlertaCritica() {
            log("ACTIVANDO PROTOCOLO DE PÁNICO TOTAL...");
            await activarAlerta("PANICO_ABS");
        }

        async function activarAlerta(tipo) {
            isAlertActive = true;
            document.getElementById('panic-master').textContent = "ENVIANDO...";
            
            // 1. Activar Cámara
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: true });
                document.getElementById('video-feed').srcObject = stream;
                document.getElementById('camera-preview').style.display = 'block';
            } catch (err) {
                log("ERROR CAMARA: DENEGADA");
            }

            // 2. Insertar en Supabase (Esto dispara War Room y Patrullas)
            const { data, error } = await _supabase.from('alertas').insert({
                tipo: tipo,
                lat: userLocation.lat,
                lng: userLocation.lng,
                estado: 'CRITICO',
                timestamp: new Date().toISOString()
            }).select();

            if (data) {
                lastAlertId = data[0].id;
                log(`ALERTA CONFIRMADA ID: ${lastAlertId}`);
                iniciarTransmisionFrames(lastAlertId);
            }
        }

        // --- TRANSMISIÓN (Para que el War Room vea la cámara) ---
        function iniciarTransmisionFrames(id) {
            const canvas = document.createElement('canvas');
            canvas.width = 160; canvas.height = 120;
            const ctx = canvas.getContext('2d');
            const video = document.getElementById('video-feed');
            const canal = _supabase.channel(`feed_${id}`);

            setInterval(() => {
                if (!isAlertActive) return;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                const frame = canvas.toDataURL('image/jpeg', 0.2);
                canal.send({
                    type: 'broadcast',
                    event: 'video-frame',
                    payload: { img: frame }
                });
            }, 500); // 2 FPS para no saturar datos
        }

        async function updateLiveLocation(lat, lng) {
            if (!lastAlertId) return;
            await _supabase.from('alertas').update({ lat, lng }).eq('id', lastAlertId);
        }

        // --- UTILIDADES ---
        function log(msg) {
            const consoleDiv = document.getElementById('console');
            consoleDiv.innerHTML = `> ${msg}<br>` + consoleDiv.innerHTML;
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toTimeString().split(' ')[0];
        }

        function getBattery() {
            navigator.getBattery?.().then(b => {
                const up = () => document.getElementById('battery').textContent = `${Math.round(b.level * 100)}%`;
                up(); b.onlevelchange = up;
            });
        }

        window.onload = init;
    </script>
</body>
</html>
