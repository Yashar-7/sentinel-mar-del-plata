<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SENTINEL v2 | WAR ROOM CENTRAL</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap');
        
        :root {
            --primary: #00ffaa;
            --secondary: #00f2ff;
            --alert: #ff003c;
            --bg: #050508;
            --panel-bg: rgba(10, 10, 15, 0.9);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg); color: var(--primary);
            font-family: 'Share Tech Mono', monospace;
            display: grid; grid-template-columns: 350px 1fr 400px;
            gap: 10px; height: 100vh; padding: 10px; overflow: hidden;
        }

        /* Efecto Scanline General */
        body::after {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 9999; pointer-events: none; background-size: 100% 3px, 3px 100%;
        }

        .panel {
            border: 1px solid rgba(0, 255, 170, 0.2);
            background: var(--panel-bg); display: flex; flex-direction: column;
            position: relative; box-shadow: inset 0 0 20px rgba(0,0,0,1);
        }

        h2 { 
            font-family: 'Orbitron', sans-serif; font-size: 0.8rem; padding: 12px;
            background: rgba(0, 255, 170, 0.1); border-bottom: 1px solid var(--primary);
            letter-spacing: 2px; display: flex; justify-content: space-between;
        }

        /* LISTA DE INCIDENTES */
        .incident-list { flex: 1; overflow-y: auto; padding: 10px; }
        
        .alerta-card {
            padding: 15px; border: 1px solid rgba(0, 255, 170, 0.1); margin-bottom: 10px;
            cursor: pointer; position: relative; transition: 0.3s;
            background: rgba(255, 255, 255, 0.02);
        }
        .alerta-card:hover { background: rgba(0, 255, 170, 0.05); border-color: var(--primary); }
        .alerta-card.critica { border-left: 4px solid var(--alert); animation: pulse-card 1.5s infinite; }
        
        @keyframes pulse-card { 0% { background: rgba(255, 0, 60, 0.05); } 50% { background: rgba(255, 0, 60, 0.2); } 100% { background: rgba(255, 0, 60, 0.05); } }

        .card-type { font-weight: bold; color: var(--alert); font-size: 0.9rem; margin-bottom: 5px; }

        /* MAPA TÁCTICO */
        #mapa { width: 100%; height: 100%; }
        .map-container { position: relative; }
        .radar-sweep {
            position: absolute; top: 0; left: 0; width: 100%; height: 4px;
            background: var(--primary); opacity: 0.3; filter: blur(5px);
            animation: sweep 4s linear infinite; z-index: 1000; pointer-events: none;
        }
        @keyframes sweep { from { top: 0%; } to { top: 100%; } }

        /* VISOR DE VIDEO */
        .video-container { background: #000; position: relative; aspect-ratio: 4/3; border-bottom: 1px solid var(--primary); }
        #canvas-stream { width: 100%; height: 100%; object-fit: cover; filter: sepia(100%) hue-rotate(110deg) brightness(1.2); }
        .no-signal { 
            position: absolute; inset: 0; display: flex; align-items: center; 
            justify-content: center; color: #333; font-size: 1.5rem;
        }

        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; font-size: 0.75rem; }
        .data-item { border-bottom: 1px solid rgba(0, 255, 170, 0.1); padding: 5px 0; }
        .data-label { opacity: 0.5; display: block; font-size: 0.6rem; }
        .data-value { color: var(--secondary); font-weight: bold; }

        /* ACCIONES */
        .actions { padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn {
            background: transparent; border: 1px solid var(--primary); color: var(--primary);
            padding: 10px; cursor: pointer; font-family: 'Orbitron'; font-size: 0.6rem;
            transition: 0.3s;
        }
        .btn:hover { background: var(--primary); color: black; }
        .btn-dispatch { border-color: var(--secondary); color: var(--secondary); }
        .btn-dispatch:hover { background: var(--secondary); color: black; }
    </style>
</head>
<body>

    <div class="panel">
        <h2>CENTRAL DE INCIDENTES <span id="count" style="color:var(--alert)">0</span></h2>
        <div class="incident-list" id="incident-feed">
            <div style="text-align:center; padding:50px; opacity:0.2;">BUSCANDO SEÑALES DE EMERGENCIA...</div>
        </div>
    </div>

    <div class="panel map-container">
        <h2>MAPA TÁCTICO MAR DEL PLATA</h2>
        <div class="radar-sweep"></div>
        <div id="mapa"></div>
    </div>

    <div class="panel">
        <h2>MONITOR DE EVIDENCIA</h2>
        <div class="video-container">
            <div id="signal-loss" class="no-signal">NO SIGNAL</div>
            <canvas id="canvas-stream"></canvas>
        </div>
        
        <div class="data-grid">
            <div class="data-item"><span class="data-label">SUJETO</span><span class="data-value" id="val-user">--</span></div>
            <div class="data-item"><span class="data-label">TIPO</span><span class="data-value" id="val-tipo">--</span></div>
            <div class="data-item"><span class="data-label">COORDENADAS</span><span class="data-value" id="val-coords">--</span></div>
            <div class="data-item"><span class="data-label">BATERÍA</span><span class="data-value" id="val-bat">--</span></div>
            <div class="data-item" style="grid-column: span 2;">
                <span class="data-label">ESTADO DE RESPUESTA</span>
                <span class="data-value" id="val-status" style="color:var(--alert)">ESPERANDO ASIGNACIÓN...</span>
            </div>
        </div>

        <div class="actions">
            <button class="btn btn-dispatch" onclick="despacharUnidad()">🚔 DESPACHAR PATRULLA</button>
            <button class="btn" onclick="cerrarCaso()">✅ FINALIZAR</button>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN SUPABASE
        const SB_URL = "TU_URL";
        const SB_KEY = "TU_KEY";
        const _client = supabase.createClient(SB_URL, SB_KEY);

        let map, canalVideo;
        let marcadores = {};
        let alertaActiva = null;

        // --- SISTEMA DE VOZ ---
        function hablar(mensaje) {
            const synth = window.speechSynthesis;
            const utter = new SpeechSynthesisUtterance(mensaje);
            utter.lang = 'es-ES'; utter.rate = 1.0; utter.pitch = 0.8;
            synth.speak(utter);
        }

        // --- INICIALIZACIÓN ---
        function init() {
            hablar("Sistema Sentinel en línea. Vigilancia activada.");
            
            map = L.map('mapa', { zoomControl: false, attributionControl: false }).setView([-38.0055, -57.5426], 14);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                filter: 'brightness(0.6) invert(1) contrast(1.2)'
            }).addTo(map);

            escucharAlertas();
            cargarAlertasVivas();
        }

        // --- LÓGICA DE ALERTAS ---
        async function cargarAlertasVivas() {
            const { data } = await _client.from('alertas').select('*').eq('estado', 'CRITICO');
            if(data) data.forEach(renderAlerta);
        }

        function escucharAlertas() {
            _client.channel('cambios-alertas')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'alertas' }, payload => {
                    const nueva = payload.new;
                    renderAlerta(nueva);
                    hablar(`Atención. Nueva alerta por ${nueva.tipo} detectada.`);
                })
                .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'alertas' }, payload => {
                    actualizarMarcador(payload.new);
                })
                .subscribe();
        }

        function renderAlerta(alerta) {
            const feed = document.getElementById('incident-feed');
            if (feed.innerText.includes("BUSCANDO")) feed.innerHTML = '';

            const card = document.createElement('div');
            card.className = `alerta-card ${alerta.estado === 'CRITICO' ? 'critica' : ''}`;
            card.id = `card-${alerta.id}`;
            card.onclick = () => sintonizar(alerta);
            card.innerHTML = `
                <div class="card-type">⚠️ ${alerta.tipo}</div>
                <div style="font-size:0.7rem;">CIUDADANO: ${alerta.id.substring(0,8)}</div>
                <div style="font-size:0.6rem; opacity:0.5;">RECIBIDO: ${new Date(alerta.timestamp).toLocaleTimeString()}</div>
            `;
            feed.prepend(card);

            // Marcador en Mapa
            const icon = L.divIcon({
                className: 'custom-div-icon',
                html: `<div style="background-color:red; width:12px; height:12px; border-radius:50%; border:2px solid white; box-shadow: 0 0 10px red;"></div>`,
                iconSize: [12, 12]
            });

            const m = L.marker([alerta.lat, alerta.lng], { icon }).addTo(map);
            marcadores[alerta.id] = m;
        }

        // --- SINTONIZACIÓN Y VIDEO ---
        function sintonizar(alerta) {
            alertaActiva = alerta;
            hablar(`Sintonizando señal de video del ciudadano.`);
            
            // Actualizar UI
            document.getElementById('val-user').innerText = alerta.id.substring(0,8);
            document.getElementById('val-tipo').innerText = alerta.tipo;
            document.getElementById('val-coords').innerText = `${alerta.lat.toFixed(4)}, ${alerta.lng.toFixed(4)}`;
            
            map.flyTo([alerta.lat, alerta.lng], 17);

            // Conectar al canal de video que envía la App
            if (canalVideo) canalVideo.unsubscribe();
            
            const canvas = document.getElementById('canvas-stream');
            const ctx = canvas.getContext('2d');
            const signalLabel = document.getElementById('signal-loss');

            canalVideo = _client.channel(`feed_${alerta.id}`);
            canalVideo.on('broadcast', { event: 'video-frame' }, payload => {
                signalLabel.style.display = 'none';
                const img = new Image();
                img.onload = () => {
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);
                };
                img.src = payload.payload.img;
            }).subscribe();
        }

        function actualizarMarcador(alerta) {
            if (marcadores[alerta.id]) {
                marcadores[alerta.id].setLatLng([alerta.lat, alerta.lng]);
                if (alertaActiva && alertaActiva.id === alerta.id) {
                    document.getElementById('val-coords').innerText = `${alerta.lat.toFixed(4)}, ${alerta.lng.toFixed(4)}`;
                }
            }
        }

        async function despacharUnidad() {
            if(!alertaActiva) return;
            hablar("Despachando unidad de respuesta inmediata a la ubicación del ciudadano.");
            document.getElementById('val-status').innerText = "UNIDAD EN CAMINO...";
            document.getElementById('val-status').style.color = "var(--primary)";
            
            await _client.from('alertas').update({ estado: 'DESPACHADA' }).eq('id', alertaActiva.id);
        }

        async function cerrarCaso() {
            if(!alertaActiva) return;
            hablar("Incidente finalizado y archivado.");
            await _client.from('alertas').update({ estado: 'CERRADO' }).eq('id', alertaActiva.id);
            location.reload();
        }

        window.onload = init;
    </script>
</body>
</html>
