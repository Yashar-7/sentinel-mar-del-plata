<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SENTINEL | WAR ROOM TÁCTICO</title>
    
    <!-- Leaflet para mapas -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #00ffaa; --alert: #ff3131; --bg: #020202; }
        
        body {
            background: var(--bg);
            color: var(--primary);
            font-family: 'Share Tech Mono', monospace;
            padding: 15px;
            display: grid;
            grid-template-columns: 300px 1fr 400px;
            gap: 15px;
            height: 100vh;
            overflow: hidden;
        }

        /* PANELES COMUNES */
        .panel {
            border: 1px solid #333;
            background: rgba(10,10,10,0.9);
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(5px);
        }

        h2 { 
            font-size: 1rem; 
            border-bottom: 1px solid var(--primary); 
            padding-bottom: 10px; 
            color: var(--primary); 
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }

        /* PANEL IZQUIERDO - LISTA DE INCIDENTES */
        .incident-list {
            flex: 1;
            overflow-y: auto;
        }

        .alerta-item {
            padding: 12px;
            border: 1px solid #222;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.8rem;
            position: relative;
        }
        .alerta-item:hover { 
            background: #111; 
            border-color: var(--primary);
            transform: translateX(5px);
        }
        .alerta-item.activa { 
            border-left: 4px solid var(--alert); 
            animation: pulse-border 1s infinite;
        }
        @keyframes pulse-border { 50% { border-left-color: transparent; } }
        
        .alerta-tipo {
            display: inline-block;
            padding: 2px 8px;
            background: rgba(255,49,49,0.2);
            border: 1px solid var(--alert);
            font-size: 0.6rem;
            margin-bottom: 5px;
        }

        /* PANEL CENTRAL - MAPA TÁCTICO */
        .map-panel {
            position: relative;
            overflow: hidden;
            padding: 0;
        }
        #mapa {
            width: 100%;
            height: 100%;
            background: #000;
        }
        .radar-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: rgba(0,255,170,0.2);
            animation: scan 4s linear infinite;
            pointer-events: none;
            z-index: 1000;
        }
        @keyframes scan { from { top: 0; } to { top: 100%; } }
        
        .map-overlay {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            padding: 5px 10px;
            font-size: 0.6rem;
            border: 1px solid var(--primary);
            z-index: 1000;
        }

        /* PANEL DERECHO - MONITOR DE VIDEO */
        .video-panel {
            display: flex;
            flex-direction: column;
        }
        #visor-tactico {
            width: 100%;
            aspect-ratio: 4/3;
            background: #000;
            border: 1px solid #333;
            margin-bottom: 15px;
        }
        .no-signal {
            color: #444;
            text-align: center;
            padding: 50px;
            font-size: 1.2rem;
        }
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 8px;
            font-size: 0.75rem;
            margin: 15px 0;
            padding: 10px;
            border: 1px solid #333;
        }
        .label { opacity: 0.6; }
        .value { color: var(--primary); font-weight: bold; }
        .value.alert { color: var(--alert); }
        
        .acciones {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .btn {
            flex: 1;
            padding: 10px;
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover { background: rgba(0,255,170,0.1); }
        .btn-alert { border-color: var(--alert); color: var(--alert); }
        .btn-alert:hover { background: rgba(255,49,49,0.1); }

        .tag-status {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--alert);
            color: black;
            padding: 2px 10px;
            font-weight: bold;
            font-size: 0.7rem;
            z-index: 1000;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- PANEL IZQUIERDO - INCIDENTES -->
    <div class="panel">
        <h2>🚨 INCIDENTES ACTIVOS</h2>
        <div class="incident-list" id="incident-list">
            <p style="opacity:0.3">Esperando señal...</p>
        </div>
    </div>

    <!-- PANEL CENTRAL - MAPA TÁCTICO -->
    <div class="panel map-panel">
        <div class="radar-line"></div>
        <div id="mapa"></div>
        <div class="map-overlay" id="map-coords">
            LAT: -38.0055 | LNG: -57.5426
        </div>
        <div class="tag-status">SENTINEL ONLINE</div>
    </div>

    <!-- PANEL DERECHO - VIDEO + DATOS -->
    <div class="panel video-panel">
        <h2>📹 MONITOR TÁCTICO</h2>
        
        <!-- Canvas para video -->
        <canvas id="visor-tactico" width="400" height="300"></canvas>
        
        <!-- Placeholder cuando no hay video -->
        <div id="placeholder-msg" class="no-signal">SIN SEÑAL</div>
        
        <!-- Información de la alerta seleccionada -->
        <div class="info-grid" id="info-alerta" style="display: none;">
            <span class="label">TIPO:</span>
            <span class="value" id="panel-tipo">--</span>
            
            <span class="label">CIUDADANO:</span>
            <span class="value" id="panel-nombre">--</span>
            
            <span class="label">DNI:</span>
            <span class="value" id="panel-dni">--</span>
            
            <span class="label">TELÉFONO:</span>
            <span class="value" id="panel-tel">--</span>
            
            <span class="label">UBICACIÓN:</span>
            <span class="value" id="panel-ubicacion">--</span>
            
            <span class="label">BATERÍA:</span>
            <span class="value alert" id="panel-bateria">--</span>
            
            <span class="label">ESTADO:</span>
            <span class="value" id="panel-estado">ACTIVA</span>
        </div>
        
        <!-- Acciones -->
        <div class="acciones" id="acciones" style="display: none;">
            <button class="btn" onclick="asignarUnidad()">🚔 ASIGNAR UNIDAD</button>
            <button class="btn btn-alert" onclick="cerrarIncidente()">✅ CERRAR</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://svpurpvbiujhcbiugrkh.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN2cHVycHZiaXVqaGNiaXVncmtoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc3NDgzMTUsImV4cCI6MjA4MzMyNDMxNX0.AivKJ0_N0z_4T4vLNfUcE2hepJ1XXOO8-4fSA3PJXdc';
        const _client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let mapa;
        let marcadores = {};
        let alertas = [];
        let alertaSeleccionada = null;
        let canalVideo = null;

        const canvas = document.getElementById('visor-tactico');
        const ctx = canvas.getContext('2d');

        // ==============================================
        // INICIALIZACIÓN
        // ==============================================
        function iniciar() {
            mapa = L.map('mapa', { zoomControl: false, attributionControl: false }).setView([-38.0055, -57.5426], 14);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                filter: 'invert(1) hue-rotate(160deg) saturate(3) brightness(0.8) contrast(1.5)'
            }).addTo(mapa);

            mapa.on('move', () => {
                const centro = mapa.getCenter();
                document.getElementById('map-coords').innerHTML = 
                    `LAT: ${centro.lat.toFixed(5)} | LNG: ${centro.lng.toFixed(5)}`;
            });

            cargarAlertasIniciales();
            suscribirAlertas();
        }

        // ==============================================
        // ALERTAS
        // ==============================================
        async function cargarAlertasIniciales() {
            const { data, error } = await _client
                .from('alertas')
                .select('*')
                .eq('activa', true)
                .order('timestamp', { ascending: false })
                .limit(10);

            if (!error && data) {
                data.forEach(alerta => {
                    alertas.push(alerta);
                    agregarAlertaALista(alerta);
                    agregarMarcador(alerta);
                });
            }
        }

        function suscribirAlertas() {
            _client
                .channel('nuevas-alertas')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'alertas' }, payload => {
                    const alerta = payload.new;
                    if (alerta.activa) {
                        alertas.unshift(alerta);
                        agregarAlertaALista(alerta);
                        agregarMarcador(alerta);
                    }
                })
                .subscribe();
        }

        function agregarAlertaALista(alerta) {
            const container = document.getElementById('incident-list');
            if (container.children[0]?.textContent === 'Esperando señal...') {
                container.innerHTML = '';
            }

            const div = document.createElement('div');
            div.className = 'alerta-item';
            div.id = `alerta-${alerta.id}`;
            
            const fecha = new Date(alerta.timestamp);
            const hora = fecha.toLocaleTimeString();
            
            div.innerHTML = `
                <div class="alerta-tipo">${alerta.tipo || 'EMERGENCIA'}</div>
                <strong>${alerta.nombre || 'Desconocido'}</strong><br>
                📍 ${alerta.lat.toFixed(5)}, ${alerta.lng.toFixed(5)}<br>
                <small>${hora}</small>
            `;
            
            div.onclick = () => sintonizarAlerta(alerta);
            container.prepend(div);
        }

        function agregarMarcador(alerta) {
            const marcador = L.circleMarker([alerta.lat, alerta.lng], {
                radius: 10,
                color: '#ff3131',
                fillColor: '#ff3131',
                fillOpacity: 0.6,
                weight: 2
            }).addTo(mapa).bindPopup(`🚨 ${alerta.tipo || 'EMERGENCIA'}<br>${alerta.nombre}`);
            
            marcadores[alerta.id] = marcador;
        }

        // ==============================================
        // SINTONIZAR VIDEO
        // ==============================================
        function sintonizarAlerta(alerta) {
            alertaSeleccionada = alerta;
            
            // Resaltar en lista
            document.querySelectorAll('.alerta-item').forEach(el => el.classList.remove('activa'));
            document.getElementById(`alerta-${alerta.id}`).classList.add('activa');
            
            // Centrar mapa
            mapa.flyTo([alerta.lat, alerta.lng], 17);
            
            // Mostrar información
            document.getElementById('info-alerta').style.display = 'grid';
            document.getElementById('acciones').style.display = 'flex';
            document.getElementById('placeholder-msg').classList.add('hidden');
            
            document.getElementById('panel-tipo').textContent = alerta.tipo || 'EMERGENCIA';
            document.getElementById('panel-nombre').textContent = alerta.nombre || '--';
            document.getElementById('panel-dni').textContent = alerta.dni || '--';
            document.getElementById('panel-tel').textContent = alerta.telefono || '--';
            document.getElementById('panel-ubicacion').textContent = `${alerta.lat.toFixed(5)}, ${alerta.lng.toFixed(5)}`;
            document.getElementById('panel-bateria').textContent = alerta.bateria || '0%';
            document.getElementById('panel-estado').textContent = alerta.cancelada ? 'CANCELADA' : 'ACTIVA';
            
            // Sintonizar canal de video
            if (canalVideo) canalVideo.unsubscribe();
            
            canalVideo = _client.channel(`alerta-${alerta.id}`);
            canalVideo.on('broadcast', { event: 'video-frame' }, (payload) => {
                const img = new Image();
                img.onload = () => {
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);
                };
                img.src = payload.payload.frame;
            }).subscribe();
        }

        // ==============================================
        // ACCIONES
        // ==============================================
        async function asignarUnidad() {
            if (!alertaSeleccionada) return;
            
            const { data: unidades, error } = await _client
                .from('unidades_respuesta')
                .select('*')
                .eq('estado', 'disponible');
            
            if (error || !unidades || unidades.length === 0) {
                alert("❌ NO HAY UNIDADES DISPONIBLES");
                return;
            }

            const unidad = unidades[0];
            
            await _client
                .from('alertas')
                .update({ unidad_asignada: unidad.codigo, estado: 'en_proceso' })
                .eq('id', alertaSeleccionada.id);
            
            alert(`🚔 UNIDAD ${unidad.codigo} ASIGNADA`);
        }

        async function cerrarIncidente() {
            if (!alertaSeleccionada) return;
            
            await _client
                .from('alertas')
                .update({ activa: false, estado: 'finalizado' })
                .eq('id', alertaSeleccionada.id);
            
            location.reload(); // Simplificado para el ejemplo
        }

        window.onload = iniciar;
    </script>
</body>
</html>
